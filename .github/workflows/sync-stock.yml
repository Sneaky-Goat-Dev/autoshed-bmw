name: Sync AutoTrader Stock

on:
  schedule:
    # Run every hour at minute 0
    - cron: '0 * * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Sync stock from AutoTrader
        env:
          AUTOTRADER_API_URL: ${{ secrets.AUTOTRADER_API_URL }}
          AUTOTRADER_USERNAME: ${{ secrets.AUTOTRADER_USERNAME }}
          AUTOTRADER_PASSWORD: ${{ secrets.AUTOTRADER_PASSWORD }}
          AUTOTRADER_DEALER_ID: ${{ secrets.AUTOTRADER_DEALER_ID }}
        run: npm run sync:stock

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet public/vehicles.json || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push changes
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add public/vehicles.json public/stock.json
          git commit -m "chore: sync autotrader stock [skip ci]"
          git push
