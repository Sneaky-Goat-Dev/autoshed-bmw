name: Sync AutoTrader Stock

on:
  # Scheduled sync DISABLED — AutoTrader stock is now synced to Supabase every
  # 10 minutes by the VPS cron (/opt/autoshed-sync). Kept for manual runs only.
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Sync stock from AutoTrader
        env:
          AUTOTRADER_API_URL: ${{ secrets.AUTOTRADER_API_URL }}
          AUTOTRADER_USERNAME: ${{ secrets.AUTOTRADER_USERNAME }}
          AUTOTRADER_PASSWORD: ${{ secrets.AUTOTRADER_PASSWORD }}
          AUTOTRADER_DEALER_ID: ${{ secrets.AUTOTRADER_DEALER_ID }}
        run: npm run sync:stock

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet public/vehicles.json || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push changes
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add public/vehicles.json public/stock.json
          git commit -m "chore: sync autotrader stock [skip ci]"
          git push
